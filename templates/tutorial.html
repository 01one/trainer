<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title></title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Crimson+Pro:ital,wght@0,400;0,700;1,400&family=Inter:wght@400;700&display=swap');
        
        body { font-family: 'Inter', sans-serif; background-color: #fcfaf7; }
        .font-serif { font-family: 'Crimson Pro', serif; }
        
        [v-cloak] { display: none; }

        .fade-enter-active, .fade-leave-active { transition: opacity 0.4s ease, transform 0.4s ease; }
        .fade-enter-from, .fade-leave-to { opacity: 0; transform: translateY(15px); }
        

        .interactive-hotspot {
            position: relative;
            z-index: 10;
            cursor: pointer !important;
            display: inline-block;
        }
        .interactive-hotspot::before {
            content: '';
            position: absolute;
            top: -10px; left: -10px; right: -10px; bottom: -10px;
            border-radius: inherit;
            border: 4px solid rgba(217, 119, 6, 0.4);
            animation: pulse-ring 2s infinite;
            pointer-events: none;
        }
        @keyframes pulse-ring {
            0% { transform: scale(0.9); opacity: 1; }
            100% { transform: scale(1.15); opacity: 0; }
        }


        .mockup-renderer {
            text-align: center;
            display: flex;
            flex-direction: column;
            align-items: center;
            width: 100%;
        }
        .mockup-renderer p, 
        .mockup-renderer h1, 
        .mockup-renderer h2, 
        .mockup-renderer h3, 
        .mockup-renderer h4 {
            text-align: center;
            width: 100%;
            margin-left: auto;
            margin-right: auto;
        }

        .mockup-renderer div {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        .mockup-renderer .flex-row, 
        .mockup-renderer [style*="display: flex"] {
            flex-direction: row !important;
            align-items: center;
            justify-content: center;
        }

        .mockup-renderer .interactive-hotspot {
            margin-left: auto;
            margin-right: auto;
        }

        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #e7e5e4; border-radius: 10px; }
    </style>
</head>
<body class="h-screen flex flex-col overflow-hidden">

<div id="app" class="flex flex-col h-full w-full" v-cloak>

    <header class="bg-white border-b border-stone-200 h-16 flex items-center justify-between px-8 shrink-0 relative z-30">
        <div class="flex items-center gap-6">
            <h1 class="font-serif font-bold text-2xl text-stone-800 italic" v-if="tutorial">[[ tutorial.title ]]</h1>
            <div class="h-6 w-px bg-stone-200"></div>
            <span v-if="tutorial && !finished" class="text-stone-400 font-bold text-xs tracking-widest uppercase">
                Step [[ currentStepIndex + 1 ]] / [[ tutorial.steps.length ]]
            </span>
        </div>
        
        <a href="/" class="text-stone-400 hover:text-red-600 transition-colors flex items-center gap-2 font-bold text-sm">
            Exit Module <i class="fas fa-times-circle text-lg"></i>
        </a>
        
        <div class="absolute bottom-0 left-0 h-1 bg-stone-100 w-full overflow-hidden">
            <div class="h-full bg-amber-600 transition-all duration-700 ease-in-out" :style="{ width: progressPercentage + '%' }"></div>
        </div>
    </header>

    <main class="flex-1 flex overflow-hidden relative">
        <template v-if="tutorial">
            
            <div v-if="finished" class="absolute inset-0 flex items-center justify-center bg-[#fdfaf6] z-50 p-6">
                <div class="text-center p-12 bg-white shadow-2xl rounded-3xl border border-amber-100 max-w-xl w-full">
                    <div class="text-7xl mb-6">✨</div>
                    <h2 class="font-serif text-5xl font-bold mb-4 text-stone-900">Knowledge Mastered</h2>
                    <button @click="restart" class="w-full bg-stone-900 text-amber-50 py-4 rounded-xl font-bold text-lg hover:bg-black transition-all shadow-lg">
                        <i class="fas fa-redo mr-2"></i> Restart Journey
                    </button>
                </div>
            </div>

            <div v-else class="flex w-full h-full">
                
                <aside class="w-80 md:w-96 bg-white border-r border-stone-200 shadow-xl flex flex-col shrink-0 z-20">
                    <div class="flex-1 p-10 overflow-y-auto space-y-8">
                        <div class="flex items-center gap-3">
                            <div class="bg-amber-600 text-white w-8 h-8 rounded-full flex items-center justify-center font-bold shadow-md">
                                [[ currentStepIndex + 1 ]]
                            </div>
                            <span class="text-stone-400 font-bold text-xs uppercase tracking-widest">Your Instructions</span>
                        </div>
                        
                        <div class="prose prose-stone font-serif text-xl leading-relaxed text-stone-800" v-html="currentStep.instruction"></div>
                        
                        <div class="bg-amber-50 p-4 rounded-xl flex items-center gap-3 text-sm text-amber-700 font-bold">
                            <i class="fas fa-pencil-alt animate-bounce"></i>
                            <span>Follow the pulsing guide</span>
                        </div>
                    </div>

                    <div class="p-6 bg-stone-50 border-t border-stone-200 flex items-center justify-between gap-4">
                        <button 
                            @click="prevStep" 
                            :disabled="currentStepIndex === 0"
                            class="flex-1 bg-white border border-stone-300 py-3 rounded-lg font-bold text-stone-600 hover:bg-stone-100 disabled:opacity-30 disabled:cursor-not-allowed transition-all">
                            <i class="fas fa-chevron-left mr-2"></i> Back
                        </button>
                        
                        <button 
                            @click="nextStep"
                            class="flex-1 bg-stone-900 text-white py-3 rounded-lg font-bold hover:bg-black transition-all shadow-md">
                            [[ currentStepIndex === tutorial.steps.length - 1 ? 'Finish' : 'Next' ]] 
                            <i class="fas fa-chevron-right ml-2" v-if="currentStepIndex !== tutorial.steps.length - 1"></i>
                        </button>
                    </div>
                </aside>


                <section ref="scrollStage" class="flex-1 overflow-y-auto bg-stone-100/50 relative scroll-smooth">
                    <div class="min-h-full w-full py-12 px-6 md:px-12 flex flex-col items-center justify-center">
                        
                        <transition name="fade" mode="out-in">
                            <div :key="currentStepIndex" class="w-full max-w-5xl" @click="handleMockupClick">
                                <div class="bg-white rounded-3xl shadow-lg border border-stone-200 overflow-hidden min-h-[500px] flex flex-col items-center justify-center p-10">
                                    <div class="mockup-renderer" v-html="currentStep.mockup"></div>
                                </div>
                                <div class="h-10"></div>
                            </div>
                        </transition>

                    </div>
                </section>
            </div>
        </template>
    </main>

</div>

<script>
    const tutId = "{{ tut_id }}";

    Vue.createApp({
        compilerOptions: { delimiters: ['[[', ']]'] },
        data() {
            return {
                tutorial: null,
                currentStepIndex: 0,
                finished: false
            }
        },
        computed: {
            currentStep() {
                if (!this.tutorial || this.finished) return null;
                return this.tutorial.steps[this.currentStepIndex];
            },
            progressPercentage() {
                if (!this.tutorial) return 0;
                if (this.finished) return 100;
                return (this.currentStepIndex / this.tutorial.steps.length) * 100;
            }
        },
        mounted() { this.loadTutorial(); },
        methods: {
            async loadTutorial() {
                const res = await fetch('/api/tutorials');
                const all = await res.json();
                this.tutorial = all.find(t => t.id === tutId);
            },
            handleMockupClick(event) {
                const hotspot = event.target.closest('.interactive-hotspot');
                if (hotspot) {
                    const targetAttr = hotspot.getAttribute('data-target-step');
                    if (targetAttr) {
                        const stepNum = parseInt(targetAttr, 10);
                        if (stepNum > this.tutorial.steps.length) this.finished = true;
                        else this.goToStep(stepNum - 1);
                    } else {
                        this.nextStep();
                    }
                }
            },
            prevStep() {
                if (this.currentStepIndex > 0) this.goToStep(this.currentStepIndex - 1);
            },
            nextStep() {
                if (this.currentStepIndex < this.tutorial.steps.length - 1) this.goToStep(this.currentStepIndex + 1);
                else this.finished = true;
            },
            goToStep(index) {
                this.currentStepIndex = index;
                this.$nextTick(() => {
                    if (this.$refs.scrollStage) {
                        this.$refs.scrollStage.scrollTo({ top: 0, behavior: 'smooth' });
                    }
                });
            },
            restart() {
                this.finished = false;
                this.goToStep(0);
            }
        }
    }).mount('#app');
</script>

</body>
</html>
